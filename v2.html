<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/p5@2.2.0/lib/p5.js"></script>  
  <meta charset="utf-8">
  <style>
    html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
            top: 0;
            left: 0;
        }</style>
</head>
<body>
<script>
let font;

async function setup() {
  createCanvas(windowWidth, windowHeight);
  font = await loadFont('SourceHanSerifSC-Regular.otf');
}

function draw() {
  background(0);
  textAlign(CENTER, CENTER);
  textSize(340);
  noFill();

  let contours = font.textToContours('树冠微风', width / 2, height / 2, {
    sampleFactor: 0.1
  });

  for (let layer = 0; layer < 15; layer++) {
    let maxExpand = layer * 6;
//    stroke(50 + layer * 14);
      strokeWeight(1-layer*0.06)
      stroke(
      
      180 - sin(frameCount*0.1 + layer * 0.4) * 60
    );

    for (const pts of contours) {
      beginShape();

      for (const pt of pts) {
        let d = dist(pt.x, pt.y, mouseX, mouseY);

        // how much this point is affected by the mouse
        let influence = map(d, 0, 250, 1, 0, true);

        // wobble also grows when mouse gets closer
        let wobbleAmount = influence * 10;
        let wobbleX = wobbleAmount * sin(pt.y * 0.1 + millis() * 0.01);
        let wobbleY = wobbleAmount * cos(pt.x * 0.1 + millis() * 0.01);

        // expansion is hidden when far away, revealed when close
        let expand = maxExpand * influence;

        let dx = pt.x - mouseX;
        let dy = pt.y - mouseY;
        let angle = atan2(dy, dx);

        let x = pt.x + wobbleX + cos(angle) * expand;
        let y = pt.y + wobbleY + sin(angle) * expand;

        splineVertex(x, y);
      }

      endShape(CLOSE);
    }
  }

  describe('The text p5*js drawn as outline contour layers that stay stacked together until the mouse gets close, revealing more expanded wobbly layers.');
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
